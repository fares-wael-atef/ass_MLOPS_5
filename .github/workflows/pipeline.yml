name: ML Pipeline - Validate and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install mlflow==2.10.0 scikit-learn numpy dvc

      - name: Pull Data with DVC
        run: dvc pull || echo "No DVC remote, skipping..."

      - name: Train Model
        run: python train.py

      - name: Upload model-info artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: |
            model_info.txt
            mlruns/

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install mlflow==2.10.0 scikit-learn numpy

      - name: Download model-info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Show downloaded files
        run: |
          echo "=== model_info.txt ===" 
          cat model_info.txt
          echo "=== mlruns folder ==="
          ls mlruns/

      - name: Check Accuracy Threshold
        run: python check_threshold.py

      - name: Mock Docker Build
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"
          docker build --build-arg RUN_ID=$(cat model_info.txt) -t ml-model:latest .
          echo "Docker image built successfully!"
