name: ML Pipeline - Validate and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ============================================================
  # JOB 1: VALIDATE
  # ============================================================
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pull Data with DVC
        run: |
          dvc pull || echo "No DVC remote configured, skipping..."

      - name: Train Model
        run: |
          python train.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: |
            model_info.txt
            mlruns/

  # ============================================================
  # JOB 2: DEPLOY
  # ============================================================
  deploy:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download model-info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Check Accuracy Threshold
        run: |
          python check_threshold.py

      - name: Mock Docker Build
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"
          docker build --build-arg RUN_ID=$(cat model_info.txt) -t ml-model:$(cat model_info.txt) .
          echo "Docker image built successfully!"